name: Build & Release FieldWorker APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.11.0)'
        required: true
        default: '1.11.0'
      version_code:
        description: 'Version code (integer, e.g. 11)'
        required: true
        default: '11'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Derive version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
            echo "code=${{ github.event.inputs.version_code }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="${TAG#v}"
            MAJOR=$(echo "$NAME" | cut -d. -f1)
            MINOR=$(echo "$NAME" | cut -d. -f2)
            PATCH=$(echo "$NAME" | cut -d. -f3)
            PATCH=${PATCH:-0}
            CODE=$(( MAJOR * 1000 + MINOR * 10 + PATCH ))
            echo "name=${NAME}" >> $GITHUB_OUTPUT
            echo "code=${CODE}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
            CODE=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2 | tr -d '[:space:]')
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "name=${VERSION}" >> $GITHUB_OUTPUT
            echo "code=${CODE}" >> $GITHUB_OUTPUT
            echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "flutter.versionName=${{ steps.version.outputs.name }}" >> android/local.properties
          echo "flutter.versionCode=${{ steps.version.outputs.code }}" >> android/local.properties

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --no-pub || echo "Tests failed - continuing build"
        continue-on-error: true

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/FieldWorker-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldWorker-${{ steps.version.outputs.tag }}-apk
          path: build/app/outputs/flutter-apk/FieldWorker-${{ steps.version.outputs.tag }}.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FieldWorker ${{ steps.version.outputs.tag }}"
          body: |
            ## FieldWorker ${{ steps.version.outputs.tag }}
            Built from commit ${{ github.sha }}
          files: build/app/outputs/flutter-apk/FieldWorker-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
